# ============================================================
# docker-compose.yml
# SI3009 - Bases de Datos Avanzadas
# Red de Monitoreo Ambiental - Cluster PostgreSQL distribuido
#
# Topología:
#   pg-primary  → Nodo primario (lectura/escritura)
#   pg-replica1 → Réplica síncrona  (lectura)
#   pg-replica2 → Réplica asíncrona (lectura)
#
# Uso en EC2 Amazon Linux 2023:
#   docker compose up -d pg-primary
#   # Esperar ~10 segundos a que el primario esté listo
#   docker compose up -d pg-replica1 pg-replica2
# ============================================================

version: "3.9"

networks:
  monitoring_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata_primary:
    driver: local
  pgdata_replica1:
    driver: local
  pgdata_replica2:
    driver: local

services:

  # ==========================================================
  # NODO PRIMARIO
  # ==========================================================
  pg-primary:
    image: postgres:15-alpine
    container_name: pg-primary
    hostname: pg-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB:       monitoreo_ambiental
      POSTGRES_USER:     admin_monitoreo
      POSTGRES_PASSWORD: admin_pass_2024
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata_primary:/var/lib/postgresql/data
      # Scripts de inicialización (orden alfabético)
      - ./docker/init/01_init_primary.sh:/docker-entrypoint-initdb.d/01_init_primary.sh:ro
      - ./docker/init/02_init_schema.sql:/docker-entrypoint-initdb.d/02_init_schema.sql:ro
      # Configuraciones de PostgreSQL
      - ./docker/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      # Scripts SQL para ejecución manual
      - ./sql:/scripts/sql:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432"   # Primario expuesto en puerto 5432
    networks:
      monitoring_net:
        ipv4_address: 172.28.1.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_monitoreo -d monitoreo_ambiental"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================
  # RÉPLICA 1 - SÍNCRONA
  # synchronous_standby_names = 'FIRST 1 (replica1)' en primary
  # application_name = replica1 en primary_conninfo
  # ==========================================================
  pg-replica1:
    image: postgres:15-alpine
    container_name: pg-replica1
    hostname: pg-replica1
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin_monitoreo
      POSTGRES_PASSWORD: admin_pass_2024
      PGDATA:            /var/lib/postgresql/data/pgdata
      # Variables para el script de setup de réplica
      PRIMARY_HOST:      pg-primary
      PRIMARY_PORT:      "5432"
      REPLICA_SLOT:      replica1_slot
      REPLICATION_USER:  replicator
      REPLICATION_PASS:  replicator_pass_2024
    volumes:
      - pgdata_replica1:/var/lib/postgresql/data
      - ./docker/replica-setup/setup_replica.sh:/docker-entrypoint-initdb.d/setup_replica.sh:ro
      - ./docker/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    # Comando: espera al primario y luego ejecuta pg_basebackup
    command: >
      bash -c "
        until pg_isready -h pg-primary -p 5432 -U admin_monitoreo; do
          echo 'Esperando al primario...';
          sleep 3;
        done;
        echo 'Primario disponible. Iniciando pg_basebackup...';
        rm -rf /var/lib/postgresql/data/pgdata;
        mkdir -p /var/lib/postgresql/data/pgdata;
        PGPASSWORD=replicator_pass_2024 pg_basebackup
          -h pg-primary
          -p 5432
          -U replicator
          -D /var/lib/postgresql/data/pgdata
          -Fp -Xs -P -R
          --slot=replica1_slot;
        echo 'primary_conninfo = host=pg-primary port=5432 user=replicator password=replicator_pass_2024 application_name=replica1' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        echo 'recovery_target_timeline = latest' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        echo 'hot_standby = on' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        echo 'hot_standby_feedback = on' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        postgres -D /var/lib/postgresql/data/pgdata;
      "
    ports:
      - "5433:5432"   # Réplica 1 expuesta en puerto 5433
    depends_on:
      pg-primary:
        condition: service_healthy
    networks:
      monitoring_net:
        ipv4_address: 172.28.1.11
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_monitoreo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==========================================================
  # RÉPLICA 2 - ASÍNCRONA
  # No está en synchronous_standby_names → asíncrona por defecto
  # application_name = replica2
  # ==========================================================
  pg-replica2:
    image: postgres:15-alpine
    container_name: pg-replica2
    hostname: pg-replica2
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin_monitoreo
      POSTGRES_PASSWORD: admin_pass_2024
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata_replica2:/var/lib/postgresql/data
      - ./docker/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      bash -c "
        until pg_isready -h pg-primary -p 5432 -U admin_monitoreo; do
          echo 'Esperando al primario...';
          sleep 3;
        done;
        echo 'Primario disponible. Iniciando pg_basebackup...';
        rm -rf /var/lib/postgresql/data/pgdata;
        mkdir -p /var/lib/postgresql/data/pgdata;
        PGPASSWORD=replicator_pass_2024 pg_basebackup
          -h pg-primary
          -p 5432
          -U replicator
          -D /var/lib/postgresql/data/pgdata
          -Fp -Xs -P -R
          --slot=replica2_slot;
        echo 'primary_conninfo = host=pg-primary port=5432 user=replicator password=replicator_pass_2024 application_name=replica2' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        echo 'recovery_target_timeline = latest' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        echo 'hot_standby = on' >> /var/lib/postgresql/data/pgdata/postgresql.auto.conf;
        postgres -D /var/lib/postgresql/data/pgdata;
      "
    ports:
      - "5434:5432"   # Réplica 2 expuesta en puerto 5434
    depends_on:
      pg-primary:
        condition: service_healthy
    networks:
      monitoring_net:
        ipv4_address: 172.28.1.12
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_monitoreo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==========================================================
  # PGADMIN - Interfaz web de administración (opcional)
  # Acceso: http://<IP-EC2>:8080
  # Login: admin@monitoreo.local / admin_2024
  # ==========================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@monitoreo.local
      PGADMIN_DEFAULT_PASSWORD: admin_2024
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    depends_on:
      - pg-primary
    networks:
      monitoring_net:
        ipv4_address: 172.28.1.20
    volumes:
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
