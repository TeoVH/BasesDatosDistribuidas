# ============================================================
# postgresql.conf - Nodo PRIMARIO
# SI3009 - Red de Monitoreo Ambiental
# ============================================================

# --- Conexiones ---
listen_addresses = '*'
port = 5432
max_connections = 100

# --- Memoria (ajustado para t2.large: 8GB RAM, 3 contenedores) ---
shared_buffers         = 512MB     # ~25% de RAM disponible por contenedor
effective_cache_size   = 1536MB    # estimado de caché del SO disponible
work_mem               = 16MB      # por operación de sort/hash
maintenance_work_mem   = 128MB     # para VACUUM, CREATE INDEX, etc.

# --- WAL (Write-Ahead Log) - CRÍTICO para replicación ---
wal_level              = replica   # habilita replicación física
max_wal_senders        = 5         # máximo de procesos walsender (uno por réplica + margen)
wal_keep_size          = 256MB     # cuánto WAL retener para las réplicas
max_replication_slots  = 5         # slots de replicación (uno por réplica)

# --- Replicación síncrona ---
# DEMOSTRACIÓN: configurar 1 réplica síncrona y 1 asíncrona
# Sintaxis: número_confirmaciones (nombre_aplicacion, ...)
# 'ANY 1 (replica1, replica2)' → espera confirmación de AL MENOS 1 réplica
# 'FIRST 1 (replica1, replica2)' → espera la primera en responder
# '' (vacío) → replicación totalmente asíncrona
synchronous_standby_names = 'FIRST 1 (replica1)'

# synchronous_commit controla cuándo confirmar al cliente:
#   on      = espera WAL en disco del primario Y réplica síncrona (máxima durabilidad)
#   remote_write = espera que la réplica reciba pero no necesariamente persista
#   local   = espera solo disco local, réplica asíncrona
#   off     = no espera disco (mayor rendimiento, riesgo de pérdida en crash)
synchronous_commit = on

# --- Checkpoints ---
checkpoint_timeout         = 5min
max_wal_size               = 1GB
min_wal_size               = 80MB
checkpoint_completion_target = 0.9

# --- Logging (para evidencias y análisis) ---
logging_collector          = on
log_directory              = 'pg_log'
log_filename               = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age           = 1d
log_rotation_size          = 100MB
log_min_duration_statement = 100ms   # loguear queries que tarden más de 100ms
log_checkpoints            = on
log_connections            = on
log_disconnections         = on
log_replication_commands   = on
log_line_prefix            = '%t [%p] %u@%d '

# --- Estadísticas (para EXPLAIN ANALYZE y monitoreo) ---
track_activities           = on
track_counts               = on
track_io_timing            = on     # necesario para EXPLAIN (ANALYZE, BUFFERS)
track_functions            = all

# --- Particionamiento ---
enable_partition_pruning   = on     # habilita eliminación de particiones irrelevantes
constraint_exclusion       = partition  # optimización para tablas particionadas

# --- Planificador ---
enable_parallel_query      = on
max_parallel_workers_per_gather = 2
max_parallel_workers       = 4
